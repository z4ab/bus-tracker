services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bus-tracker-backend:latest
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80"]
    ports:
      - "8000:80"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: bus-tracker-frontend:latest
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    driver: bridge
